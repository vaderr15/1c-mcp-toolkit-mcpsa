services:
  onec-mcp-toolkit-proxy:
    build: .
    ports:
      - "6003:6003"
    environment:
      - PORT=6003
      - TIMEOUT=180
      - LOG_LEVEL=INFO
      - CORS_ALLOW_ALL=true
      - ALLOW_DANGEROUS_WITH_APPROVAL=true
      - RESPONSE_FORMAT=json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
